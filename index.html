<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Chimbombis - Elegancia en cada compra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- MODO SELECCION -->
    <div id="modeSelector" class="mode-selector active">
        <div class="mode-container">
            <div class="mode-header">
                <i class="fas fa-shopping-bag"></i>
                <h1>Boutique Chimbombis</h1>
                <p>Elegancia en cada compra</p>
            </div>

            <div class="mode-options">
                <button class="mode-btn buyer-btn" onclick="selectMode('buyer')">
                    <i class="fas fa-shopping-cart"></i>
                    <h3>Comprador</h3>
                    <p>Explora y compra productos</p>
                </button>

                <button class="mode-btn admin-btn" onclick="selectMode('admin')">
                    <i class="fas fa-shield-alt"></i>
                    <h3>Administrador</h3>
                    <p>Gestiona productos</p>
                </button>
            </div>
        </div>
    </div>

    <!-- MODO COMPRADOR -->
    <div id="buyerMode" class="mode-content">
        <header class="buyer-header">
            <div class="container">
                <div class="header-top">
                    <div class="logo">
                        <i class="fas fa-shopping-bag"></i>
                        <h1>Boutique Chimbombis</h1>
                    </div>
                    <div class="header-controls">
                        <input type="text" id="searchInput" placeholder="Buscar productos..." class="search-box">
                        <button class="btn-back" onclick="backToMode()">
                            <i class="fas fa-arrow-left"></i> Volver
                        </button>
                    </div>
                </div>

                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">
                        <i class="fas fa-th"></i> Todos
                    </button>
                    <button class="filter-tab" data-filter="perfume">
                        <i class="fas fa-spray-can"></i> Perfumes
                    </button>
                    <button class="filter-tab" data-filter="ropa">
                        <i class="fas fa-shirt"></i> Ropa
                    </button>
                    <button class="filter-tab" data-filter="calzado">
                        <i class="fas fa-shoe-prints"></i> Calzado
                    </button>
                </div>
            </div>
        </header>

        <main class="buyer-main">
            <div class="container">
                <div class="cart-summary">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Carrito: <strong id="cartCount">0</strong> items | Total: $<strong id="cartTotal">0.00</strong></span>
                </div>

                <div class="buyer-layout">
                    <div class="products-section">
                        <div id="buyerProductsGrid" class="products-grid">
                            <!-- Se llena con JavaScript -->
                        </div>
                    </div>
                    
                    <aside class="cart-sidebar">
                        <h2><i class="fas fa-shopping-cart"></i> Mi Carrito</h2>
                        <div id="cartContainer" class="cart-list">
                            <p class="empty-cart">Tu carrito está vacío</p>
                        </div>
                    </aside>
                </div>
            </div>
        </main>

        <!-- Modal de detalle de producto -->
        <div id="productModal" class="modal">
            <div class="modal-content product-detail">
                <button class="modal-close" onclick="closeProductModal()">
                    <i class="fas fa-times"></i>
                </button>
                <div id="modalBody" class="modal-body">
                    <!-- Se llena con JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- MODO ADMINISTRADOR -->
    <div id="adminMode" class="mode-content">
        <header class="admin-header">
            <div class="container">
                <div class="header-top">
                    <div class="logo">
                        <i class="fas fa-shield-alt"></i>
                        <h1>Panel de Administrador</h1>
                    </div>
                    <button class="btn-back" onclick="backToMode()">
                        <i class="fas fa-arrow-left"></i> Volver
                    </button>
                </div>

                <div class="admin-stats">
                    <div class="stat-card">
                        <i class="fas fa-box"></i>
                        <div>
                            <p>Total Productos</p>
                            <h3 id="totalProductsCount">0</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-dollar-sign"></i>
                        <div>
                            <p>Valor Total</p>
                            <h3>$<span id="totalValue">0.00</span></h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-layer-group"></i>
                        <div>
                            <p>Stock Total</p>
                            <h3 id="totalStock">0</h3>
                        </div>
                    </div>
                </div>

                <button class="btn-primary btn-lg" onclick="openAddProductModal()">
                    <i class="fas fa-plus"></i> Agregar Producto
                </button>
            </div>
        </header>

        <main class="admin-main">
            <div class="container">
                <div id="adminProductsTable" class="products-table">
                    <!-- Se llena con JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL DE PRODUCTO (Admin) -->
    <div id="adminModal" class="modal">
        <div class="modal-content admin-form-modal">
            <div class="modal-header">
                <h2 id="modalTitle">Agregar Producto</h2>
                <button class="modal-close" onclick="closeAddProductModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form id="productForm" onsubmit="handleProductSubmit(event)" class="product-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="inputName" required>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="inputCategory" required>
                            <option value="">Selecciona...</option>
                            <option value="perfume">Perfume</option>
                            <option value="ropa">Ropa</option>
                            <option value="calzado">Calzado</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Precio</label>
                        <input type="number" id="inputPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" id="inputStock" min="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="inputDescription" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>Imagen</label>
                    <input type="file" id="inputImage" accept="image/*">
                    <small>Sube una imagen (JPG, PNG)</small>
                </div>

                <div id="imagePreview" class="image-preview" style="display: none;">
                    <img id="previewImg" alt="Preview">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                    <button type="button" class="btn-secondary" onclick="closeAddProductModal()">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- NOTIFICACION -->
    <div id="notification" class="notification"></div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="supabase-service.js"></script>
    <script src="data.js"></script>
    <script src="admin.js"></script>
    <script src="buyer.js"></script>
    <script src="main-init.js"></script>
</body>
</html>
